<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Reset password</title>
  <link rel="stylesheet" href="/styles.refactor.css">
  <style>
    body { font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial; background:#f1f5f9; margin:0; padding:0; }
    .reset-card { max-width:420px; margin:50px auto; padding:24px; background:#fff; border-radius:18px; box-shadow:0 24px 50px rgba(15,23,42,0.15); }
    .reset-card h1 { margin:0 0 8px; font-size:24px; }
    .form-field { display:flex; flex-direction:column; gap:4px; margin-bottom:12px; }
    .form-field input { padding:10px 12px; border-radius:10px; border:1px solid #cbd5f5; font-size:14px; background:#fff; }
    .reset-footer { display:flex; justify-content:flex-end; gap:8px; }
    .reset-footer button { padding:10px 16px; border-radius:10px; border:none; background:#3b82f6; color:#fff; font-weight:600; cursor:pointer; }
    .muted { color:#64748b; font-size:13px; }
    .error { color:#ef4444; min-height:18px; margin-bottom:12px; }
  </style>
</head>
<body>
  <div class="reset-card">
    <h1>Reset password</h1>
    <p class="muted">Enter a new password to finish resetting your account.</p>
    <p id="resetError" class="error"></p>
    <div class="form-field">
      <label for="resetPassword">New password</label>
      <input id="resetPassword" type="password" placeholder="••••••••" />
    </div>
    <div class="form-field">
      <label for="resetConfirm">Confirm password</label>
      <input id="resetConfirm" type="password" placeholder="••••••••" />
    </div>
    <div class="reset-footer">
      <button id="resetSubmit" type="button">Submit</button>
    </div>
    <p id="status" class="muted" style="margin-top:8px;"></p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');
    const passwordEl = document.getElementById('resetPassword');
    const confirmEl = document.getElementById('resetConfirm');
    const errorEl = document.getElementById('resetError');
    const statusEl = document.getElementById('status');
    const submitBtn = document.getElementById('resetSubmit');

    if (!token) {
      errorEl.textContent = 'Invalid reset link.';
      submitBtn.disabled = true;
    }

    async function submitReset() {
      errorEl.textContent = '';
      statusEl.textContent = '';
      const pwd = passwordEl.value.trim();
      const confirm = confirmEl.value.trim();
    if (!pwd || !confirm) {
      errorEl.textContent = 'Both fields are required.';
      return;
    }
    if (pwd !== confirm) {
      errorEl.textContent = 'Passwords do not match.';
      return;
    }
    if (pwd.length < 8) {
      errorEl.textContent = 'Password must be at least 8 characters.';
      return;
    }
    if (!/[A-Z]/.test(pwd) || !/[0-9]/.test(pwd)) {
      errorEl.textContent = 'Password must include at least one uppercase letter and one number.';
      return;
    }
    submitBtn.disabled = true;
      statusEl.textContent = 'Updating password...';
      try {
        const res = await fetch('/api/auth/reset-password/complete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ token, password: pwd })
        });
        const payload = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(payload.error || 'Could not update password');
        statusEl.textContent = 'Password updated. Please log in.';
        setTimeout(() => {
          window.location.href = '/';
        }, 1200);
      } catch (err) {
        errorEl.textContent = err.message || 'Could not update password';
      } finally {
        submitBtn.disabled = false;
      }
    }

    submitBtn.addEventListener('click', submitReset);
  </script>
</body>
</html>
